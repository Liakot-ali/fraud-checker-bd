<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderation Management Suite | Guard Desk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">
    <div id="login-block" class="max-w-md mx-auto mt-24 p-8 bg-slate-800 rounded-2xl border border-slate-700 shadow-xl">
        <h2 class="text-xl font-bold tracking-tight mb-4">Secure Moderator Gateway</h2>
        <div class="space-y-3">
            <input type="text" id="user" placeholder="Admin Username" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-100 focus:outline-none focus:border-red-500">
            <input type="password" id="pass" placeholder="Authorization Password" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-100 focus:outline-none focus:border-red-500">
            <button onclick="login()" class="w-full bg-red-600 py-2 rounded-lg font-semibold text-sm hover:bg-red-700 transition">Request Console Entry</button>
        </div>
    </div>

    <div id="console-block" class="max-w-5xl mx-auto my-12 p-6 hidden">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4 mb-6">
            <h1 class="text-2xl font-black tracking-tight text-white">Central Moderation Workflow Terminal</h1>
            <button onclick="window.location.reload()" class="text-xs bg-slate-800 px-3 py-1.5 rounded text-slate-400 hover:text-white">Exit Security State</button>
        </div>

        <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4">Active System Verification Queue</h3>
        <div id="queue" class="space-y-4"></div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="sticky top-0 bg-slate-800 border-b border-slate-700 p-6 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-white">Event Details Review</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-2xl">×</button>
            </div>

            <div id="modal-content" class="p-6 space-y-6">
                <!-- Content will be populated dynamically -->
            </div>

            <div class="sticky bottom-0 bg-slate-800 border-t border-slate-700 p-6 flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-semibold transition">Close</button>
                <button onclick="doModerate('reject')" class="px-4 py-2 bg-slate-600 hover:bg-slate-500 rounded-lg text-sm font-semibold transition">Reject / Flag Away</button>
                <button onclick="doModerate('approve')" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm font-semibold text-white transition">Approve & Merge Identity</button>
            </div>
        </div>
    </div>

    <script>
        let token = "";
        let currentEventId = null;

        async function login() {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: document.getElementById('user').value, password: document.getElementById('pass').value })
            });
            const data = await res.json();
            if(data.success) {
                token = data.token;
                document.getElementById('login-block').classList.add('hidden');
                document.getElementById('console-block').classList.remove('hidden');
                fetchQueue();
            } else {
                alert(data.error);
            }
        }

        async function fetchQueue() {
            const res = await fetch('/api/admin/moderation-queue');
            const events = await res.json();
            const queueDiv = document.getElementById('queue');
            queueDiv.innerHTML = '';

            if(events.length === 0) {
                queueDiv.innerHTML = '<div class="text-slate-500 text-sm text-center py-8 border border-dashed border-slate-800 rounded-xl">Queue clear. No pending incident vectors require administrative validation.</div>';
                return;
            }

            events.forEach(e => {
                queueDiv.innerHTML += `
                    <div onclick="viewEventDetails('${e._id}')" class="p-6 bg-slate-800 border border-slate-700 rounded-xl space-y-3 cursor-pointer hover:border-red-500/50 hover:bg-slate-800/80 transition">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="text-lg font-bold text-white">${e.scam_type}</h4>
                                <p class="text-xs text-slate-400">Submitted at: ${new Date(e.submitted_at).toLocaleString()}</p>
                            </div>
                            <span class="bg-amber-500/10 text-amber-400 text-xs px-2 py-1 rounded border border-amber-500/20 font-mono font-bold uppercase">Pending Check</span>
                        </div>
                        <p class="text-sm text-slate-300 bg-slate-900/50 p-3 rounded border border-slate-800">${e.description}</p>
                        <div class="text-xs text-slate-400 flex justify-between">
                            <span>💰 Loss: ${e.loss_amount ? '$' + e.loss_amount.toLocaleString() : 'Not specified'}</span>
                            <span>📍 Item: ${e.loss_item}</span>
                        </div>
                        <p class="text-xs text-slate-500 italic">Click to view full details and decide...</p>
                    </div>
                `;
            });
        }

        async function viewEventDetails(eventId) {
            currentEventId = eventId;
            try {
                const res = await fetch(`/api/admin/events/${eventId}/details`);
                const data = await res.json();
                
                if (!data.event) {
                    alert('Event not found');
                    return;
                }

                const event = data.event;
                const phones = data.phones || [];
                const identifiers = data.identifiers || [];
                const profile = data.profile;

                let phonesList = phones.map(p => p.phone_number).join(', ') || 'None recorded';
                let profileInfo = profile ? `<strong>${profile.display_name}</strong> (ID: ${profile._id})` : 'New profile (will be created if approved)';

                const modalContent = `
                    <div class="space-y-6">
                        <!-- Main Event Information -->
                        <div class="border border-slate-700 rounded-lg p-4 bg-slate-900/50">
                            <h3 class="text-sm font-bold uppercase text-slate-400 mb-3">Event Information</h3>
                            <div class="grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <p class="text-slate-400 text-xs">Scam Type</p>
                                    <p class="text-white font-semibold">${event.scam_type}</p>
                                </div>
                                <div>
                                    <p class="text-slate-400 text-xs">Loss Amount</p>
                                    <p class="text-red-400 font-semibold">${event.loss_amount ? '$' + event.loss_amount.toLocaleString() : 'Not specified'}</p>
                                </div>
                                <div>
                                    <p class="text-slate-400 text-xs">Loss Item</p>
                                    <p class="text-white">${event.loss_item}</p>
                                </div>
                                <div>
                                    <p class="text-slate-400 text-xs">GD Number</p>
                                    <p class="text-slate-300">${event.gd_number || 'N/A'}</p>
                                </div>
                                <div class="col-span-2">
                                    <p class="text-slate-400 text-xs">Address</p>
                                    <p class="text-slate-300">${event.address || 'Not provided'}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="border border-slate-700 rounded-lg p-4 bg-slate-900/50">
                            <h3 class="text-sm font-bold uppercase text-slate-400 mb-3">Incident Description</h3>
                            <p class="text-slate-200 text-sm leading-relaxed">${event.description}</p>
                        </div>

                        <!-- Reporter Information -->
                        <div class="border border-slate-700 rounded-lg p-4 bg-slate-900/50">
                            <h3 class="text-sm font-bold uppercase text-slate-400 mb-3">Reporter Information</h3>
                            <div class="grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <p class="text-slate-400 text-xs">Reporter Name</p>
                                    <p class="text-white">${event.reporter_name || 'Anonymous'}</p>
                                </div>
                                <div>
                                    <p class="text-slate-400 text-xs">Visibility</p>
                                    <p class="text-slate-300 capitalize">${event.reporter_visibility || 'Not specified'}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Contact Information -->
                        <div class="border border-slate-700 rounded-lg p-4 bg-slate-900/50">
                            <h3 class="text-sm font-bold uppercase text-slate-400 mb-3">Contact Information</h3>
                            <div>
                                <p class="text-slate-400 text-xs mb-2">Phone Numbers</p>
                                <div class="bg-slate-800 p-3 rounded border border-slate-700">
                                    <p class="text-white font-mono text-sm">${phonesList}</p>
                                </div>
                            </div>
                            ${identifiers.length > 0 ? `
                                <div class="mt-3">
                                    <p class="text-slate-400 text-xs mb-2">Identifiers</p>
                                    <div class="space-y-2">
                                        ${identifiers.map(id => `
                                            <div class="bg-slate-800 p-2 rounded border border-slate-700 text-sm">
                                                <p class="text-slate-400 text-xs">${id.identifier_type}</p>
                                                <p class="text-white font-mono">${id.identifier_value}</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>

                        <!-- Profile Matching -->
                        <div class="border border-slate-700 rounded-lg p-4 bg-slate-900/50">
                            <h3 class="text-sm font-bold uppercase text-slate-400 mb-3">Profile Status</h3>
                            <div class="bg-slate-800 p-3 rounded border border-slate-700">
                                <p class="text-sm">${profileInfo}</p>
                            </div>
                        </div>

                        <!-- Timeline -->
                        <div class="border border-slate-700 rounded-lg p-4 bg-slate-900/50">
                            <h3 class="text-sm font-bold uppercase text-slate-400 mb-3">Timeline</h3>
                            <div class="text-xs text-slate-400 space-y-1">
                                <p>📝 Submitted: ${new Date(event.submitted_at).toLocaleString()}</p>
                                ${event.approved_at ? `<p>✅ Approved: ${new Date(event.approved_at).toLocaleString()}</p>` : ''}
                                ${event.rejected_at ? `<p>❌ Rejected: ${new Date(event.rejected_at).toLocaleString()}</p>` : ''}
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('modal-content').innerHTML = modalContent;
                document.getElementById('detail-modal').classList.remove('hidden');
            } catch (err) {
                alert('Error loading event details: ' + err.message);
            }
        }

        async function doModerate(action) {
            if (!currentEventId) return;
            
            try {
                const res = await fetch(`/api/admin/events/${currentEventId}/${action}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': token }
                });
                const data = await res.json();
                alert(data.message);
                closeModal();
                fetchQueue();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            currentEventId = null;
        }

        // Close modal when clicking outside
        document.getElementById('detail-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
