<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderation Management Suite | Guard Desk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">
    <div id="login-block" class="max-w-md mx-auto mt-24 p-8 bg-slate-800 rounded-2xl border border-slate-700 shadow-xl">
        <h2 class="text-xl font-bold tracking-tight mb-4">Secure Moderator Gateway</h2>
        <div class="space-y-3">
            <input type="text" id="user" placeholder="Admin Username" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-100 focus:outline-none focus:border-red-500">
            <input type="password" id="pass" placeholder="Authorization Password" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-100 focus:outline-none focus:border-red-500">
            <button onclick="login()" class="w-full bg-red-600 py-2 rounded-lg font-semibold text-sm hover:bg-red-700 transition">Request Console Entry</button>
        </div>
    </div>

    <div id="console-block" class="max-w-5xl mx-auto my-12 p-6 hidden">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4 mb-6">
            <h1 class="text-2xl font-black tracking-tight text-white">Central Moderation Workflow Terminal</h1>
            <button onclick="window.location.reload()" class="text-xs bg-slate-800 px-3 py-1.5 rounded text-slate-400 hover:text-white">Exit Security State</button>
        </div>

        <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4">Active System Verification Queue</h3>
        <div id="queue" class="space-y-4"></div>
    </div>

    <script>
        let token = "";
        async function login() {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: document.getElementById('user').value, password: document.getElementById('pass').value })
            });
            const data = await res.json();
            if(data.success) {
                token = data.token;
                document.getElementById('login-block').classList.add('hidden');
                document.getElementById('console-block').classList.remove('hidden');
                fetchQueue();
            } else {
                alert(data.error);
            }
        }

        async function fetchQueue() {
            const res = await fetch('/api/admin/moderation-queue');
            const events = await res.json();
            const queueDiv = document.getElementById('queue');
            queueDiv.innerHTML = '';

            if(events.length === 0) {
                queueDiv.innerHTML = '<div class="text-slate-500 text-sm text-center py-8 border border-dashed border-slate-800 rounded-xl">Queue clear. No pending incident vectors require administrative validation.</div>';
                return;
            }

            events.forEach(e => {
                queueDiv.innerHTML += `
                    <div class="p-6 bg-slate-800 border border-slate-700 rounded-xl space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="text-lg font-bold text-white">${e.scam_type}</h4>
                                <p class="text-xs text-slate-400">Submitted at timestamp: ${e.submitted_at}</p>
                            </div>
                            <span class="bg-amber-500/10 text-amber-400 text-xs px-2 py-1 rounded border border-amber-500/20 font-mono font-bold uppercase">Pending Check</span>
                        </div>
                        <p class="text-sm text-slate-300 bg-slate-900/50 p-3 rounded border border-slate-800">${e.description}</p>
                        <div class="flex justify-end gap-2 pt-2 border-t border-slate-700/50">
                            <button onclick="moderate(${e.id}, 'reject')" class="px-4 py-1.5 bg-slate-700 hover:bg-slate-600 rounded text-xs font-semibold transition">Reject / Flag Away</button>
                            <button onclick="moderate(${e.id}, 'approve')" class="px-4 py-1.5 bg-red-600 hover:bg-red-700 rounded text-xs font-semibold text-white transition">Approve & Merge Identity</button>
                        </div>
                    </div>
                `;
            });
        }

        async function moderate(id, action) {
            const res = await fetch(`/api/admin/events/${id}/${action}`, {
                method: 'PATCH',
                headers: { 'Authorization': token }
            });
            const data = await res.json();
            alert(data.message);
            fetchQueue();
        }
    </script>
</body>
</html>
